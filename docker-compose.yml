services:
  postgres:
    image: postgres:16-alpine
    container_name: fraternityos-db
    environment:
      POSTGRES_USER: fraternityos
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: fraternityos
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraternityos"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
